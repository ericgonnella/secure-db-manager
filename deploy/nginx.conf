# Reverse-proxy config for fronting Baseport's HTTP server with TLS.
#
# Replace `baseport.example.com` with your real hostname and provide a
# certificate (e.g. via certbot / Let's Encrypt). Drop into
# `/etc/nginx/conf.d/baseport.conf` and reload.
#
# Notes:
#   - `proxy_buffering off` is REQUIRED for `/api/events` (Server-Sent Events).
#   - `try_files` makes the SPA work for client-side routes.
#   - Static assets are served by nginx directly from the unpacked `dist/`.

server {
    listen 80;
    server_name baseport.example.com;

    # Redirect everything to HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name baseport.example.com;

    ssl_certificate     /etc/letsencrypt/live/baseport.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/baseport.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Security headers — match the desktop CSP we hardened in the Tauri build.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # Frontend SPA.
    root /var/www/baseport;
    index index.html;
    location / {
        try_files $uri /index.html;
    }

    # Backend API.
    location /api/ {
        proxy_pass http://127.0.0.1:8473;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-lived connections (SSE on /api/events).
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        proxy_cache off;
    }
}
